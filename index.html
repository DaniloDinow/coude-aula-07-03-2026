<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMULÁRIO DE INSCRIÇÃO PARA WORKSHOP</title>
</head>
<body>
<h1>INSCRIÇÃO PARA WORKSHOP</h1>
<form action="#" method="post">
    <fieldset>
        <legend><b>Formulário de Inscrição</b></legend>
        <label for="nome">Nome:</label>
        <input type="text" name="nome" id="nome" placeholder="Nome Completo" required>
        <br><br>
        <label for="email">E-mail:</label>
        <input type="email" name="email" id="email" placeholder="seuemail@provedor.com" required>
        <br><br>
        <label for="telefone">Telefone:</label>
        <input type="text" name="telefone" id="telefone" minlength="11" maxlength="15" pattern="[0-9]*">
        <br><br>
        <label for="dt_nascimento">Data de Nascimento:</label>
        <input type="date" name="dt_nascimento" id="dt_nascimento">
        <br><br>
        <label for="">Sexo:</label>
        <label for="sexoM">Masculino</label>
        <input type="radio" name="sexo" id="sexoM" value="Masculino">
        <label for="sexoF">Feminino</label>
        <input type="radio" name="sexo" id="sexoF" value="Feminino">
        <br><br>
        <label for="qtd_oficinas">Quantidade de Oficinas que deseja participar:</label>
        <input type="number" name="qtd_oficinas" id="qtd_oficinas" min="1" max="5">
        <br><br>
        <label for="tema">Tema de Interesse</label>
        <input list="tema">
        <datalist id="tema">
            <option value="Esportes">
            <option value="Saúde">
            <option value="Educação">
            <option value="Política">
        </datalist>
        <br><br>
        <label for="">Áreas de Interesse:</label><br>
        <label for="area1">Tecnologia</label>
        <input type="checkbox" name="area1" id="area1" value="Tecnologia">
        <label for="area2">Desempenho</label>
        <input type="checkbox" name="area2" id="area2" value="Desempenho">
        <label for="area3">História</label>
        <input type="checkbox" name="area3" id="area3" value="História">
        <label for="area4">Marketing</label>
        <input type="checkbox" name="area4" id="area4" value="Marketing">
        <br><br>
        <label for="tipo_incricao">Tipo de Inscrição</label>
        <select name="tipo_incricao" id="tipo_incricao">
            <option value="Palestrante">Palestrante</option>
            <option value="Participante">Participante</option>
        </select>
        <input type="submit" value="ENVIAR">
        <input type="reset" value="LIMPAR">
    </fieldset>



</form>
</body>
</html>
