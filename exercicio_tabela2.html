<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas em HTML</title>
</head>
<body>
    <table border="1">
        <thead bgcolor="grey">
            <tr>
                <th>NOME</th>
                <th>IDADE</th>
                <th>CIDADE</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Danilo</td>
                <td>40</td>
                <td>FSA</td>
            </tr>
            <tr>
                <td>Pedro</td>
                <td>25</td>
                <td>SSA</td>
            </tr>
        </tbody>
        <tfoot></tfoot>
    </table>
    
    <br>
    
    <table border="1">
        <thead bgcolor="grey">
            <tr>
                <th>PRODUTO</th>
                <th>PREÇO</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>mouse</td>
                <td>20</td>
            </tr>
            <tr>
                <td>teclado</td>
                <td>60</td>
            </tr>
            <tr>
                <td colspan="2">Total</td>
            </tr>
        </tbody>
        <tfoot></tfoot> 
    </table>
</body>
</html>
